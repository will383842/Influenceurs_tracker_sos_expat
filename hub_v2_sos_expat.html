/* ─── SURVEY ─── */
function startSurvey(id){
  curSv=SURVEYS.find(s=>s.id===id);curQ=0;
  if(!gAns[id])gAns[id]={};
  mode='survey';renderSurvey();
}

function renderSurvey(){
  const sv=curSv;const c=COLORS[sv.id];const tot=sv.steps.length;
  const s=sv.steps[curQ];const a=gAns[sv.id][s.id];
  const pct=Math.round((curQ+1)/tot*100);
  const isLast=curQ===tot-1;
  const isFirst=curQ===0;

  let extra='';
  if(isFirst){
    extra=`<div class="multi-sel-wrap">${PROFIL.map(f=>{
      const av=gAns._p?gAns._p[f.id]:'';
      return`<div class="sel-field">
        <div class="sel-lbl">${f.label}</div>
        <div class="selwrap"><select onchange="sp('${f.id}',this.value)"><option value="">— Sélectionner —</option>${f.opts.map(o=>`<option${av===o?' selected':''}>${o}</option>`).join('')}</select><span class="sarr">▾</span></div>
      </div>`;
    }).join('')}</div>`;
  }

  document.getElementById('wrap').innerHTML=`
  <div class="top" style="background:${c.main}">
    <div class="brand"><div class="sq" style="background:rgba(0,0,0,.25)">${sv.emoji}</div>
      <div><div class="bn">${sv.title}</div><div class="bs">${sv.teaser}</div></div></div>

      <div class="pnum" style="color:rgba(255,255,255,.8)">${curQ+1}/${tot}</div>

    ${s.hint?`<div class="q-hint">${s.hint}</div>`:''}
    ${extra}
    ${buildQ(s,a,sv.id,c)}

  <div class="nav">
    <button class="btnb" onclick="${isFirst?'renderHub()':'prevQ()'}">${isFirst?'← Hub':'← Retour'}</button>

      ${isLast?'Voir les résultats →':'Suivant →'}

}

function buildQ(s,a,sid,c){
  const col=c.main;
  if(s.type==='c4'){
    return`<div class="card4">${s.opts.map(o=>`
      <div class="c4${a===o.v?' sel':''}" style="${a===o.v?'border-color:'+col+';':''}" onclick="pickC4('${sid}','${s.id}','${o.v}',this)">
        <div class="c4e">${o.e}</div><div class="c4l">${o.l}</div>
      </div>`).join('')}</div>`;
  } else if(s.type==='radio'){
    const lkd=s.lkd||{};const tot=Object.values(lkd).reduce((a,b)=>a+b,0)||100;
    return`<div class="opts">${s.opts.map((o,i)=>{
      const v=s.vals?s.vals[i]:o;const sel=a===v;
      const p=lkd[v]?Math.round(lkd[v]/tot*100):0;
      return`<div class="opt${sel?' sel':''}" style="${sel?'border-color:'+col:''}" onclick="pickOpt('${sid}','${s.id}','${v}',this)">
        <div class="ofill" style="width:${p}%;background:${col}22"></div>
        <div class="oin"><div class="ora" style="${sel?'background:'+col+';border-color:'+col:''}"><div class="ordot"></div></div>
        <span class="olbl">${o}</span>${p?`<span class="opct" style="${sel?'color:'+col:''}">${p}%</span>`:''}</div></div>`;
    }).join('')}</div>`;
  } else if(s.type==='check'){
    const sa=a||[];const lkd=s.lkd||{};const tot=Object.values(lkd).reduce((a,b)=>a+b,0)||100;
    return`<div class="cbs">${s.opts.map((o,i)=>{
      const v=s.vals?s.vals[i]:o;const sel=sa.includes(v);
      const lkey=Object.keys(lkd).find(k=>v.includes(k.slice(0,4)));
      const p=lkey?Math.round(lkd[lkey]/tot*100):0;
      return`<div class="cb${sel?' sel':''}" style="${sel?'border-color:'+col:''}" onclick="togCb('${sid}','${s.id}','${v}',this)">
        <div class="cbfill" style="width:${p}%;background:${col}22"></div>
        <div class="cbi"><div class="cbsq" style="${sel?'background:'+col+';border-color:'+col:''}"><div class="cbck"></div></div>
        <span class="cblbl">${o}</span>${p?`<span class="cbpct" style="${sel?'color:'+col:''}">${p}%</span>`:''}</div></div>`;
    }).join('')}</div>`;
  } else if(s.type==='sl'){
    const v=a??s.def;const p=Math.round((v-s.min)/(s.max-s.min)*100);
    const disp=v>=s.max?(v.toLocaleString('fr-FR')+'+ €'):v===0?'0 €':(v.toLocaleString('fr-FR')+' €');
    return`<div class="slbox">
      <div class="slval" id="slv">${disp}</div>
      <div class="slunit">${s.unit}</div>
      <div class="slavg" style="color:${col}">Moyenne enquête : ${s.avg.toLocaleString('fr-FR')} €</div>
      <div class="sltrack"><div class="slrail" id="slr" style="width:${p}%;background:${col}"></div>
      <input type="range" class="rng" style="color:${col}" min="${s.min}" max="${s.max}" step="${s.step}" value="${v}" oninput="updSl(this,${s.min},${s.max},'${sid}','${s.id}','${col}')"></div>
      <div class="rlbls"><span>0 €</span><span>${s.max.toLocaleString('fr-FR')}+ €</span></div>
    </div>`;
  } else if(s.type==='stars'){
    const sv2=a||0;
    const lb=['','😬 Dur','😐 Moyen','🙂 Bien','😊 Très bien','🤩 Incroyable !'];
    return`<div class="stbox">
      <div class="strow">${[1,2,3,4,5].map(i=>`<span class="star${sv2>=i?' lit':''}" style="${sv2>=i?'color:'+col:'color:rgba(255,255,255,.15)'}" onclick="setSt('${sid}','${s.id}',${i},'${col}')" data-v="${i}">★</span>`).join('')}</div>
      <div class="sdesc" id="sdesc">${sv2?lb[sv2]:'Touchez une étoile'}</div>
    </div>`;
  } else if(s.type==='nps'){
    const sv2=a!==undefined?a:-1;
    return`<div class="npsbox">
      <div class="npslbls"><span>🙅 Jamais</span><span>Absolument 🙌</span></div>
      <div class="npsrow">${[...Array(11).keys()].map(i=>`<button class="nbtn${sv2===i?' sel':''}" style="${sv2===i?'background:'+col+';border-color:'+col:''}" onclick="setNPS('${sid}','${s.id}',${i},'${col}')">${i}</button>`).join('')}</div>
    </div>`;
  } else if(s.type==='email'){
    const av=gAns[sid]?.email||'';
    return`<div class="embox">
      <div class="em-notice" style="background:${col}18;border-color:${col}">📊 Les stats sont calculées pour TOUS — email totalement optionnel.</div>
      <input class="ein" type="email" placeholder="votre@email.com (optionnel)" value="${av}" oninput="gAns['${sid}']['email']=this.value">
      <div class="consent-row" onclick="toggleCon('${col}')">
        <div class="cbox3${con?' on':''}" id="cbox3" style="${con?'background:'+col+';border-color:'+col:''}"><div class="cck3" style="opacity:${con?1:0}"></div></div>
        <span class="ctxt">Recevoir les résultats finaux par email. RGPD, zéro spam.</span>
      </div>
    </div>`;
  }
  return'';
}

function sp(fid,v){if(!gAns._p)gAns._p={};gAns._p[fid]=v}
function toggleCon(col){con=!con;const b=document.getElementById('cbox3');if(b){b.style.background=con?col:'';b.style.borderColor=con?col:'';b.querySelector('.cck3').style.opacity=con?'1':'0';}}
function pickC4(sid,qid,v,el){
  if(!gAns[sid])gAns[sid]={};gAns[sid][qid]=v;
  el.closest('.card4').querySelectorAll('.c4').forEach(o=>{o.classList.remove('sel');o.style.borderColor='';});
  el.classList.add('sel');el.style.borderColor=COLORS[sid].main;
  setTimeout(()=>nextQ(),300);
}
function pickOpt(sid,qid,v,el){
  if(!gAns[sid])gAns[sid]={};gAns[sid][qid]=v;
  el.closest('.opts').querySelectorAll('.opt').forEach(o=>{o.classList.remove('sel');o.style.borderColor='';});
  el.classList.add('sel');el.style.borderColor=COLORS[sid].main;
  setTimeout(()=>nextQ(),300);
}
function togCb(sid,qid,v,el){
  if(!gAns[sid])gAns[sid]={};if(!gAns[sid][qid])gAns[sid][qid]=[];
  const i=gAns[sid][qid].indexOf(v);
  if(i>=0)gAns[sid][qid].splice(i,1);else gAns[sid][qid].push(v);
  el.classList.toggle('sel');
  const col=COLORS[sid].main;
  el.style.borderColor=el.classList.contains('sel')?col:'';
}
function updSl(el,mn,mx,sid,qid,col){
  const v=parseInt(el.value);if(!gAns[sid])gAns[sid]={};gAns[sid][qid]=v;
  document.getElementById('slr').style.width=Math.round((v-mn)/(mx-mn)*100)+'%';
  document.getElementById('slv').textContent=v>=mx?(v.toLocaleString('fr-FR')+'+ €'):v===0?'0 €':(v.toLocaleString('fr-FR')+' €');
}
function setSt(sid,qid,v,col){
  if(!gAns[sid])gAns[sid]={};gAns[sid][qid]=v;
  const lb=['','😬 Dur','😐 Moyen','🙂 Bien','😊 Très bien','🤩 Incroyable !'];
  document.querySelectorAll('.star').forEach(s=>{
    const lit=parseInt(s.dataset.v)<=v;s.classList.toggle('lit',lit);s.style.color=lit?col:'rgba(255,255,255,.15)';
  });
  const d=document.getElementById('sdesc');if(d)d.textContent=lb[v];
  setTimeout(()=>nextQ(),380);
}
function setNPS(sid,qid,v,col){
  if(!gAns[sid])gAns[sid]={};gAns[sid][qid]=v;
  document.querySelectorAll('.nbtn').forEach((b,i)=>{
    b.classList.toggle('sel',i===v);b.style.background=i===v?col:'';b.style.borderColor=i===v?col:'';
  });
  setTimeout(()=>nextQ(),300);
}
function nextQ(){
  const tot=curSv.steps.length;
  if(curQ<tot-1){curQ++;renderSurvey();}
}
function prevQ(){if(curQ>0){curQ--;renderSurvey();}}
function finishSurvey(){completed.add(curSv.id);showResults();}

function showResults(){
  const sv=curSv;const c=COLORS[sv.id];
  const nextIdx=SURVEYS.findIndex(s=>s.id===sv.id)+1;
  const nextSv=nextIdx<SURVEYS.length?SURVEYS[nextIdx]:null;
