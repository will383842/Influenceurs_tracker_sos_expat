name: Republish landings by IDs

# Repasse en status=published une liste d'IDs. Utile après import force_update
# sur nouvelles landings créées (qui sortent en 'draft').

on:
  workflow_dispatch:
    inputs:
      ids:
        description: 'IDs séparés par virgule'
        required: true
        default: ''

jobs:
  republish:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: SSH + republish
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/influenceurs-tracker
            IDS="${{ inputs.ids }}"
            docker exec inf-app php artisan tinker --execute="
              \$ids = array_map('intval', explode(',', '$IDS'));
              \$n = \App\Models\LandingPage::whereIn('id', \$ids)->update(['status' => 'published', 'published_at' => now()]);
              echo 'Republished : ' . \$n . PHP_EOL;
              \App\Models\LandingPage::whereIn('id', \$ids)->get()->each(function(\$lp){
                echo '  #' . \$lp->id . '  ' . \$lp->status . '  ' . \$lp->canonical_url . PHP_EOL;
              });
            " 2>&1 | tail -15
