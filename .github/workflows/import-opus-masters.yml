name: Import Opus masters (from tmp/lp-vn-sg-my-expansion)

# Dispatch manuel pour importer les masters Opus FR écrits via Claude
# Code Pro Max (chat) dans tmp/lp-vn-sg-my-expansion/.
#
# Options :
# - --dispatch-variants=false (défaut) : n'appelle PAS Haiku 4.5 pour
#   les 8 traductions → 0$. Les siblings non-FR seront remplis plus
#   tard via `landings:backfill-translations` ou des masters Opus
#   écrits à la main dans le chat.
# - dir peut être surchargé pour pointer vers un autre dossier.
#
# Utilisation :
#   gh workflow run import-opus-masters.yml
#   gh workflow run import-opus-masters.yml -f dir=tmp/lp-th-expansion

on:
  workflow_dispatch:
    inputs:
      dir:
        description: 'Chemin relatif vers dossier JSON masters'
        required: true
        default: 'tmp/lp-vn-sg-my-expansion'
      dispatch_variants:
        description: 'true = appelle Haiku 4.5 pour 8 traductions (coût API). false = juste FR.'
        type: boolean
        required: true
        default: false
      force_update:
        description: 'true = ÉCRASER les landings existantes (même slug) avec le nouveau contenu — pour enrichir les vides sans doublons.'
        type: boolean
        required: true
        default: true

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: SSH + artisan landings:import
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 12m
          script: |
            set -e
            cd /opt/influenceurs-tracker

            DIR_HOST="${{ inputs.dir }}"
            DISPATCH="${{ inputs.dispatch_variants }}"
            FORCE="${{ inputs.force_update }}"

            echo "=== Files to import (host view) ==="
            ls -la "$DIR_HOST" 2>&1 || { echo "Dir not found on host: $DIR_HOST"; exit 1; }

            # Le container n'a pas de bind mount sur /opt/influenceurs-tracker
            # (seul laravel-api/ est bake dans l'image). On copie les JSON via
            # docker cp dans /tmp/landing-import/ du container.
            CONTAINER_DIR="/tmp/landing-import"
            docker exec inf-app mkdir -p "$CONTAINER_DIR"
            docker exec inf-app sh -c "rm -f $CONTAINER_DIR/*.json" 2>/dev/null || true
            for f in "$DIR_HOST"/*.json; do
              fname=$(basename "$f")
              docker cp "$f" "inf-app:$CONTAINER_DIR/$fname"
            done
            echo ""
            echo "=== Files now in container ($CONTAINER_DIR) ==="
            docker exec inf-app ls -la "$CONTAINER_DIR" 2>&1 | tail -20

            echo ""
            echo "=== Landings BEFORE ==="
            docker exec inf-app php artisan tinker --execute="echo 'Published : ' . \App\Models\LandingPage::where('status','published')->count() . PHP_EOL;" 2>&1 | tail -3

            echo ""
            echo "=== Running landings:import --dir=$CONTAINER_DIR --dispatch-variants=$DISPATCH --force-update=$FORCE ==="
            docker exec inf-app php artisan landings:import --dir="$CONTAINER_DIR" --dispatch-variants="$DISPATCH" --force-update="$FORCE" 2>&1 | tail -60

            echo ""
            echo "=== Landings AFTER ==="
            docker exec inf-app php artisan tinker --execute="echo 'Published : ' . \App\Models\LandingPage::where('status','published')->count() . PHP_EOL; \App\Models\LandingPage::where('status','published')->whereIn('generation_source',['manual','manual_opus','ai_enriched'])->selectRaw('generation_source, country_code, language, COUNT(*) as c')->groupBy('generation_source','country_code','language')->orderBy('country_code')->orderBy('language')->limit(50)->get()->each(function(\$r){ echo sprintf('  %s %s/%s : %d', \$r->generation_source, \$r->country_code, \$r->language, \$r->c) . PHP_EOL; });" 2>&1 | tail -40

            echo ""
            echo "=== DONE ==="
